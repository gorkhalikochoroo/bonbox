<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="BonBox — Free smart business analytics dashboard. Track sales, expenses, inventory, cash flow & more. Works for any small business worldwide." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BonBox" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph for Facebook sharing -->
    <meta property="og:title" content="BonBox — Din digitale bonkasse" />
    <meta property="og:description" content="Free smart dashboard for small businesses in Denmark. Track sales, expenses, inventory, waste & staff. Danish VAT/moms ready." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bonbox.dk" />
    <meta property="og:image" content="https://bonbox.dk/icon-512.png" />
    <meta property="og:locale" content="da_DK" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BonBox — Smart analytics for small businesses" />
    <meta name="twitter:description" content="Free dashboard to track sales, expenses, inventory & waste. Built for small businesses." />

    <!-- SEO extras -->
    <meta name="keywords" content="small business analytics, business dashboard, sales tracking, expense tracking, inventory management, cash book, bonkasse, kassesystem, retail management, restaurant management" />
    <meta name="author" content="BonBox" />
    <link rel="canonical" href="https://bonbox.dk/" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "BonBox",
      "description": "Smart business analytics dashboard for small businesses. Track sales, expenses, inventory, cash flow and staff scheduling.",
      "url": "https://bonbox.dk",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "DKK"
      },
      "availableLanguage": ["da", "en"]
    }
    </script>

    <title>BonBox — Din digitale bonkasse | Free business analytics dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for PWA + force update
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then(function(reg) {
            // Check for updates every page load
            reg.update();
          }).catch(() => {});
        });
      }

      // Auto-recover from stale cache crashes
      // If the app crashes and shows ErrorBoundary, this detects it and clears cache
      window.addEventListener("error", function(e) {
        // Only trigger on chunk/module load failures
        if (e.message && (e.message.includes("Loading chunk") || e.message.includes("Failed to fetch") || e.message.includes("Importing a module"))) {
          // Clear all caches and reload once
          if (!sessionStorage.getItem("cache_cleared")) {
            sessionStorage.setItem("cache_cleared", "1");
            if ("caches" in window) {
              caches.keys().then(function(keys) {
                return Promise.all(keys.map(function(k) { return caches.delete(k); }));
              }).then(function() {
                window.location.reload();
              });
            }
          }
        }
      });
    </script>
  </body>
</html>
